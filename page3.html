<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不熟悉單字</title>
    <style>
        :root {
            --bg: #f7f3ea;
            --ink: #1e293b;
            --muted: #64748b;
            --nav: #12343b;
            --primary: #2f6f73;
            --primary-dark: #24585b;
            --accent: #c7673c;
            --line: #d8dee8;
            --soft: #e7f0ef;
            --shadow: 0 18px 50px rgba(30, 41, 59, 0.12);
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(47, 111, 115, 0.16), transparent 34%),
                linear-gradient(315deg, rgba(199, 103, 60, 0.14), transparent 30%),
                var(--bg);
        }

        nav {
            background: var(--nav);
            padding: 14px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 8px 28px rgba(18, 52, 59, 0.18);
        }

        nav a {
            color: #eef7f6;
            text-decoration: none;
            padding: 9px 12px;
            border-radius: 8px;
            font-weight: 700;
        }

        nav a.active,
        nav a:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        main {
            width: min(980px, calc(100% - 32px));
            margin: 42px auto;
        }

        .shell {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            padding: 28px;
            border-bottom: 1px solid var(--line);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 30px;
        }

        .muted {
            color: var(--muted);
            line-height: 1.7;
            margin: 8px 0 0;
        }

        .content {
            padding: 28px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        .stat {
            background: var(--soft);
            border: 1px solid rgba(47, 111, 115, 0.16);
            border-radius: 8px;
            padding: 14px;
        }

        .stat span {
            color: var(--muted);
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .stat strong {
            font-size: 20px;
        }

        .question-card,
        .result-card,
        .list-card {
            border: 1px solid var(--line);
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        #question {
            font-size: 38px;
            font-weight: 800;
            margin: 12px 0 24px;
            word-break: break-word;
        }

        #options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        button {
            min-height: 46px;
            padding: 12px 16px;
            border: 0;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(47, 111, 115, 0.2);
        }

        button.accent {
            background: var(--accent);
        }

        button.accent:hover {
            background: #a95231;
        }

        button.danger {
            background: var(--danger);
        }

        button.danger:hover {
            background: #b91c1c;
        }

        button:disabled {
            background: #aab4c2;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        #result {
            min-height: 30px;
            margin-top: 18px;
            font-size: 20px;
            font-weight: 800;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .word-table th, .word-table td {
            border: 1px solid var(--line);
            padding: 12px;
            text-align: left;
        }

        .word-table th {
            background-color: var(--soft);
        }

        .streak-badge {
            background-color: #f59e0b;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 680px) {
            .header,
            .stats,
            #options {
                grid-template-columns: 1fr;
            }

            .header,
            .content {
                padding: 22px;
            }

            #question {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">首頁</a>
        <a href="page1.html">全部單字練習</a>
        <a href="page2.html">30 題抽考</a>
        <a class="active" href="page3.html">不熟悉單字</a>
    </nav>

    <main>
        <section class="shell">
            <div class="header">
                <div>
                    <h1>不熟悉單字複習本</h1>
                    <p class="muted">這裡記錄了你在測驗中答錯的字。連續答對 3 次的字會自動從清單移出！</p>
                </div>
                <div>
                    <button class="accent" id="startQuizBtn" onclick="startWrongWordsQuiz()">開始錯題複習測驗</button>
                    <button class="danger" onclick="clearWrongWords()">清空錯題本</button>
                </div>
            </div>

            <div class="content">
                <div class="stats">
                    <div class="stat">
                        <span>目前不熟悉單字總數</span>
                        <strong id="wrongTotal">0</strong>
                    </div>
                    <div class="stat">
                        <span>複習測驗得分</span>
                        <strong id="score">0</strong>
                    </div>
                </div>

                <section id="quizPanel" class="question-card hidden">
                    <div class="muted" id="progress">第 1 題 / --</div>
                    <div id="question"></div>
                    <div id="options"></div>
                    <div id="result"></div>
                    <div class="controls">
                        <button id="nextBtn" class="accent" onclick="nextQuestion()" disabled>下一題</button>
                        <button onclick="exitQuiz()">結束測驗</button>
                    </div>
                </section>

                <section id="listPanel" class="list-card">
                    <h3>不熟悉單字列表</h3>
                    <div id="tableContainer">
                        </div>
                </section>
            </div>
        </section>
    </main>

    <script src="words.js"></script>
    <script>
        const allWords = window.getVocabularyWords();
        const wrongWordsKey = "wrongWords";

        let quizWords = [];
        let currentIndex = 0;
        let score = 0;
        let answered = false;

        // 初始化載入
        function initPage() {
            renderWrongWordsList();
        }

        // 讀取並渲染錯題列表
        function renderWrongWordsList() {
            let wrongWords = JSON.parse(localStorage.getItem(wrongWordsKey)) || {};
            let keys = Object.keys(wrongWords);
            
            document.getElementById("wrongTotal").innerHTML = keys.length;

            // 如果沒有錯題，隱藏開始測驗按鈕
            if (keys.length === 0) {
                document.getElementById("startQuizBtn").disabled = true;
                document.getElementById("tableContainer").innerHTML = "<p class='muted'>目前沒有不熟悉的單字，太棒了！</p>";
                return;
            } else {
                document.getElementById("startQuizBtn").disabled = false;
            }

            let html = `<table class="word-table">
                            <thead>
                                <tr>
                                    <th>英文單字</th>
                                    <th>中文釋義</th>
                                    <th>連續答對次數</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>`;

            keys.forEach(key => {
                let item = wrongWords[key];
                html += `<tr>
                            <td><strong>${item.word}</strong></td>
                            <td>${item.definition}</td>
                            <td><span class="streak-badge">${item.correctStreak} / 3</span></td>
                            <td><button class="danger" style="min-height:30px; padding:4px 10px; font-size:13px;" onclick="removeSingleWord('${key}')">移除</button></td>
                         </tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById("tableContainer").innerHTML = html;
        }

        // 亂數排序
        function shuffle(list){
            let result = [...list];
            for(let i = result.length - 1; i > 0; i--){
                let j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        // 開始錯題測驗
        function startWrongWordsQuiz() {
            let wrongWords = JSON.parse(localStorage.getItem(wrongWordsKey)) || {};
            let keys = Object.keys(wrongWords);
            
            if (keys.length === 0) return;

            // 將物件轉成陣列格式 [[english, meaning], ...]
            quizWords = shuffle(keys.map(key => [wrongWords[key].word, wrongWords[key].definition]));
            
            currentIndex = 0;
            score = 0;
            answered = false;

            document.getElementById("quizPanel").classList.remove("hidden");
            document.getElementById("listPanel").classList.add("hidden");
            document.getElementById("score").innerHTML = score;

            showQuestion();
        }

        // 顯示題目
        function showQuestion(){
            answered = false;
            document.getElementById("nextBtn").disabled = true;

            let current = quizWords[currentIndex];
            let answers = [current[1]];

            // 從「大題庫 allWords」中撈取干擾項
            while(answers.length < 4){
                let option = allWords[Math.floor(Math.random() * allWords.length)][1];
                if(!answers.includes(option)){
                    answers.push(option);
                }
            }

            answers = shuffle(answers);

            document.getElementById("progress").innerHTML = `第 ${currentIndex + 1} 題 / 共 ${quizWords.length} 題`;
            document.getElementById("question").innerHTML = current[0];
            document.getElementById("result").innerHTML = "";

            let html = "";
            answers.forEach(answer => {
                html += `<button onclick="checkAnswer('${answer}')">${answer}</button>`;
            });

            document.getElementById("options").innerHTML = html;
        }

        // 檢查答案
        function checkAnswer(answer){
            if(answered) return;
            answered = true;

            let current = quizWords[currentIndex];
            let correct = answer === current[1];
            let wordKey = current[0];

            let wrongWords = JSON.parse(localStorage.getItem(wrongWordsKey)) || {};

            if(correct){
                score++;
                document.getElementById("result").innerHTML = "答對！🎉";

                if (wrongWords[wordKey]) {
                    wrongWords[wordKey].correctStreak += 1;
                    // 連續答對 3 次，自動自錯題本中移除
                    if (wrongWords[wordKey].correctStreak >= 3) {
                        delete wrongWords[wordKey];
                        document.getElementById("result").innerHTML += " (此單字已熟記，移出錯題本！)";
                    }
                }
            } else {
                document.getElementById("result").innerHTML = `答錯了 ❌，答案是：${current[1]}`;
                // 答錯，連續答對次數歸零
                if (wrongWords[wordKey]) {
                    wrongWords[wordKey].correctStreak = 0;
                }
            }

            // 更新回 LocalStorage
            localStorage.setItem(wrongWordsKey, JSON.stringify(wrongWords));
            document.getElementById("score").innerHTML = score;
            document.getElementById("nextBtn").disabled = false;
            
            document.querySelectorAll("#options button").forEach(button => {
                button.disabled = true;
            });
        }

        // 下一題
        function nextQuestion(){
            if(!answered) return;
            currentIndex++;

            if(currentIndex >= quizWords.length){
                alert(`測驗結束！您的得分：${score} / ${quizWords.length}`);
                exitQuiz();
                return;
            }

            showQuestion();
        }

        // 離開或結束測驗
        function exitQuiz() {
            document.getElementById("quizPanel").classList.add("hidden");
            document.getElementById("listPanel").classList.remove("hidden");
            renderWrongWordsList();
        }

        // 手動刪除單個錯題
        function removeSingleWord(key) {
            let wrongWords = JSON.parse(localStorage.getItem(wrongWordsKey)) || {};
            if (wrongWords[key]) {
                delete wrongWords[key];
                localStorage.setItem(wrongWordsKey, JSON.stringify(wrongWords));
                renderWrongWordsList();
            }
        }

        // 全數清空錯題本
        function clearWrongWords() {
            if (confirm("確定要清空所有的不熟悉單字紀錄嗎？")) {
                localStorage.removeItem(wrongWordsKey);
                renderWrongWordsList();
            }
        }

        // 頁面加載完成執行初始化
        window.onload = initPage;
    </script>
</body>
</html>
