<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 題抽考</title>
    <style>
        :root {
            --bg: #f7f3ea;
            --ink: #1e293b;
            --muted: #64748b;
            --nav: #12343b;
            --primary: #2f6f73;
            --primary-dark: #24585b;
            --accent: #c7673c;
            --line: #d8dee8;
            --soft: #e7f0ef;
            --shadow: 0 18px 50px rgba(30, 41, 59, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(47, 111, 115, 0.16), transparent 34%),
                linear-gradient(315deg, rgba(199, 103, 60, 0.14), transparent 30%),
                var(--bg);
        }

        nav {
            background: var(--nav);
            padding: 14px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 8px 28px rgba(18, 52, 59, 0.18);
        }

        nav a {
            color: #eef7f6;
            text-decoration: none;
            padding: 9px 12px;
            border-radius: 8px;
            font-weight: 700;
        }

        nav a.active,
        nav a:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        main {
            width: min(980px, calc(100% - 32px));
            margin: 42px auto;
        }

        .shell {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            padding: 28px;
            border-bottom: 1px solid var(--line);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 30px;
        }

        .muted {
            color: var(--muted);
            line-height: 1.7;
            margin: 8px 0 0;
        }

        .content {
            padding: 28px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        .stat {
            background: var(--soft);
            border: 1px solid rgba(47, 111, 115, 0.16);
            border-radius: 8px;
            padding: 14px;
        }

        .stat span {
            color: var(--muted);
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .stat strong {
            font-size: 20px;
        }

        .question-card,
        .result-card {
            border: 1px solid var(--line);
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
        }

        #question {
            font-size: 38px;
            font-weight: 800;
            margin: 12px 0 24px;
            word-break: break-word;
        }

        #options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        button {
            min-height: 46px;
            padding: 12px 16px;
            border: 0;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(47, 111, 115, 0.2);
        }

        button.accent {
            background: var(--accent);
        }

        button.accent:hover {
            background: #a95231;
        }

        button:disabled {
            background: #aab4c2;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        #result {
            min-height: 30px;
            margin-top: 18px;
            font-size: 20px;
            font-weight: 800;
        }

        #reviewList {
            display: grid;
            gap: 10px;
            margin-top: 18px;
        }

        .review-item {
            background: #fff8f1;
            border: 1px solid #efd2bd;
            border-left: 5px solid var(--accent);
            border-radius: 8px;
            padding: 12px 14px;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 680px) {
            .header,
            .stats,
            #options {
                grid-template-columns: 1fr;
            }

            .header,
            .content {
                padding: 22px;
            }

            #question {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">首頁</a>
        <a href="page1.html">全部單字練習</a>
        <a class="active" href="page2.html">30 題抽考</a>
        <a href="page3.html">不熟悉單字</a>
    </nav>

    <main>
        <section class="shell">
            <div class="header">
                <div>
                    <h1>30 題抽考</h1>
                    <p class="muted">從目前題庫自動抽出 30 題。之後你增加單字，這裡會跟著使用新的題庫。</p>
                </div>
                <button class="accent" onclick="restartQuiz()">重新抽題</button>
            </div>

            <div class="content">
                <div class="stats">
                    <div class="stat">
                        <span>題庫總數</span>
                        <strong id="wordTotal">0</strong>
                    </div>
                    <div class="stat">
                        <span>抽考題數</span>
                        <strong id="quizTotal">30</strong>
                    </div>
                    <div class="stat">
                        <span>目前分數</span>
                        <strong id="score">0</strong>
                    </div>
                </div>

                <section id="quizPanel" class="question-card">
                    <div class="muted" id="progress">第 1 題 / 30</div>
                    <div id="question"></div>
                    <div id="options"></div>
                    <div id="result"></div>
                    <div class="controls">
                        <button id="nextBtn" class="accent" onclick="nextQuestion()" disabled>下一題</button>
                    </div>
                </section>

                <section id="finishPanel" class="result-card hidden">
                    <h1>抽考完成</h1>
                    <p id="finalScore" class="muted"></p>
                    <div class="controls">
                        <button onclick="restartQuiz()">重新抽 30 題</button>
                    </div>
                    <div id="reviewList"></div>
                </section>
            </div>
        </section>
    </main>

    <script src="words.js"></script>
    <script>
        const allWords = window.getVocabularyWords();
        const quizSize = Math.min(30, allWords.length);
        const wrongWordsKey = "wrongWords";
        
        let quizWords = [];
        let currentIndex = 0;
        let score = 0;
        let answered = false;
        let review = [];

        function shuffle(list){
            let result = [...list];

            for(let i = result.length - 1; i > 0; i--){
                let j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }

            return result;
        }

        function restartQuiz(){
            quizWords = shuffle(allWords).slice(0, quizSize);
            currentIndex = 0;
            score = 0;
            answered = false;
            review = [];

            document.getElementById("quizPanel").classList.remove("hidden");
            document.getElementById("finishPanel").classList.add("hidden");
            document.getElementById("wordTotal").innerHTML = allWords.length;
            document.getElementById("quizTotal").innerHTML = quizSize;
            document.getElementById("score").innerHTML = score;

            showQuestion();
        }

        function showQuestion(){
            answered = false;
            document.getElementById("nextBtn").disabled = true;

            let current = quizWords[currentIndex];
            let answers = [current[1]];

            while(answers.length < 4){
                let option = allWords[Math.floor(Math.random() * allWords.length)][1];
                if(!answers.includes(option)){
                    answers.push(option);
                }
            }

            answers = shuffle(answers);

            document.getElementById("progress").innerHTML = "第 " + (currentIndex + 1) + " 題 / " + quizSize;
            document.getElementById("question").innerHTML = current[0];
            document.getElementById("result").innerHTML = "";

            let html = "";

            answers.forEach(answer => {
                html += `<button onclick="checkAnswer('${answer}')">${answer}</button>`;
            });

            document.getElementById("options").innerHTML = html;
        }

        function checkAnswer(answer){
            if(answered){
                return;
            }

            answered = true;
            let current = quizWords[currentIndex];
            let correct = answer === current[1];
            let wordKey = current[0];

            let wrongWords = JSON.parse(localStorage.getItem(wrongWordsKey)) || {};

            if(correct){
                score++;
                document.getElementById("result").innerHTML = "答對";

                if (wrongWords[wordKey]) {
                    wrongWords[wordKey].correctStreak += 1;
                    if (wrongWords[wordKey].correctStreak >= 3) {
                        delete wrongWords[wordKey];
                    }
                }
            }else{
                document.getElementById("result").innerHTML = "答錯，答案：" + current[1];

                if (!wrongWords[wordKey]) {
                    wrongWords[wordKey] = {
                        word: current[0],
                        definition: current[1],
                        correctStreak: 0
                    };
                } else {
                    wrongWords[wordKey].correctStreak = 0;
                }
            }

            localStorage.setItem(wrongWordsKey, JSON.stringify(wrongWords));

            review.push({
                english: current[0],
                correctAnswer: current[1],
                yourAnswer: answer,
                correct: correct
            });

            document.getElementById("score").innerHTML = score;
            document.getElementById("nextBtn").disabled = false;
            document.querySelectorAll("#options button").forEach(button => {
                button.disabled = true;
            });
        }

        function nextQuestion(){
            if(!answered){
                return;
            }

            currentIndex++;

            if(currentIndex >= quizSize){
                showFinished();
                return;
            }

            showQuestion();
        }

        function showFinished(){
            document.getElementById("quizPanel").classList.add("hidden");
            document.getElementById("finishPanel").classList.remove("hidden");
            document.getElementById("finalScore").innerHTML = "你的分數：" + score + " / " + quizSize;

            let html = "";

            review.forEach((item, index) => {
                let result = item.correct ? "答對" : "答錯";
                html += `
                    <div class="review-item">
                        <strong>${index + 1}. ${item.english}</strong><br>
                        ${result}，你的答案：${item.yourAnswer}，正確答案：${item.correctAnswer}
                    </div>
                `;
            });

            document.getElementById("reviewList").innerHTML = html;
        }

        restartQuiz();
    </script>
</body>
</html>
