<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部單字練習</title>
    <style>
        :root {
            --bg: #f7f3ea;
            --ink: #1e293b;
            --muted: #64748b;
            --nav: #12343b;
            --primary: #2f6f73;
            --primary-dark: #24585b;
            --accent: #c7673c;
            --line: #d8dee8;
            --soft: #e7f0ef;
            --shadow: 0 18px 50px rgba(30, 41, 59, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(47, 111, 115, 0.16), transparent 34%),
                linear-gradient(315deg, rgba(199, 103, 60, 0.14), transparent 30%),
                var(--bg);
        }

        nav {
            background: var(--nav);
            padding: 14px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 8px 28px rgba(18, 52, 59, 0.18);
        }

        nav a {
            color: #eef7f6;
            text-decoration: none;
            padding: 9px 12px;
            border-radius: 8px;
            font-weight: 700;
        }

        nav a.active,
        nav a:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        main {
            width: min(980px, calc(100% - 32px));
            margin: 42px auto;
        }

        .shell {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            padding: 28px;
            border-bottom: 1px solid var(--line);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 30px;
        }

        .muted {
            color: var(--muted);
            line-height: 1.7;
            margin: 8px 0 0;
        }

        .content {
            padding: 28px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        .stat {
            background: var(--soft);
            border: 1px solid rgba(47, 111, 115, 0.16);
            border-radius: 8px;
            padding: 14px;
        }

        .stat span {
            color: var(--muted);
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .stat strong {
            font-size: 20px;
        }

        .question-card {
            border: 1px solid var(--line);
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
        }

        #question {
            font-size: 38px;
            font-weight: 800;
            margin: 12px 0 24px;
            word-break: break-word;
        }

        #options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        button {
            min-height: 46px;
            padding: 12px 16px;
            border: 0;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(47, 111, 115, 0.2);
        }

        button.accent {
            background: var(--accent);
        }

        button.accent:hover {
            background: #a95231;
        }

        button:disabled {
            background: #aab4c2;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        #result {
            min-height: 30px;
            margin-top: 18px;
            font-size: 20px;
            font-weight: 800;
        }

        @media (max-width: 680px) {
            .header,
            .stats,
            #options {
                grid-template-columns: 1fr;
            }

            .header,
            .content {
                padding: 22px;
            }

            #question {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">首頁</a>
        <a class="active" href="page1.html">全部單字練習</a>
        <a href="page2.html">30 題抽考</a>
        <a href="page3.html">不熟悉單字</a>
    </nav>

    <main>
        <section class="shell">
            <div class="header">
                <div>
                    <h1>全部單字練習</h1>
                    <p class="muted">地毯式練習整個題庫的單字。答錯也會幫你記到不熟悉單字本喔！</p>
                </div>
                <button class="accent" onclick="toggleRandom()">切換順序模式</button>
            </div>

            <div class="content">
                <div class="stats">
                    <div class="stat">
                        <span>目前進度</span>
                        <strong id="progressText">0 / 0</strong>
                    </div>
                    <div class="stat">
                        <span>目前模式</span>
                        <strong id="modeText">依序練習</strong>
                    </div>
                </div>

                <section class="question-card">
                    <div id="question"></div>
                    <div id="options"></div>
                    <div id="result"></div>
                    <div class="controls">
                        <button id="nextBtn" class="accent" onclick="nextQuestion()" disabled>下一題</button>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="words.js"></script>
    <script>
        const allWords = window.getVocabularyWords();
        const wrongWordsKey = "wrongWords";

        let practiceWords = [...allWords];
        let currentIndex = 0;
        let answered = false;
        let isRandom = false;

        function shuffle(list){
            let result = [...list];
            for(let i = result.length - 1; i > 0; i--){
                let j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function initPractice() {
            if(isRandom) {
                practiceWords = shuffle(allWords);
                document.getElementById("modeText").innerHTML = "隨機亂序";
            } else {
                practiceWords = [...allWords];
                document.getElementById("modeText").innerHTML = "依序練習";
            }
            currentIndex = 0;
            showQuestion();
        }

        function toggleRandom() {
            isRandom = !isRandom;
            initPractice();
        }

        function showQuestion(){
            answered = false;
            document.getElementById("nextBtn").disabled = true;

            let current = practiceWords[currentIndex];
            let answers = [current[1]];

            while(answers.length < 4){
                let option = allWords[Math.floor(Math.random() * allWords.length)][1];
                if(!answers.includes(option)){
                    answers.push(option);
                }
            }

            answers = shuffle(answers);

            document.getElementById("progressText").innerHTML = (currentIndex + 1) + " / " + practiceWords.length;
            document.getElementById("question").innerHTML = current[0];
            document.getElementById("result").innerHTML = "";

            let html = "";
            answers.forEach(answer => {
                html += `<button onclick="checkAnswer('${answer}')">${answer}</button>`;
            });

            document.getElementById("options").innerHTML = html;
        }

        function checkAnswer(answer){
            if(answered) return;
            answered = true;

            let current = practiceWords[currentIndex];
            let correct = answer === current[1];
            let wordKey = current[0];

            let wrongWords = JSON.parse(localStorage.getItem(wrongWordsKey)) || {};

            if(correct){
                document.getElementById("result").innerHTML = "答對！🎉";
                if (wrongWords[wordKey]) {
                    wrongWords[wordKey].correctStreak += 1;
                    if (wrongWords[wordKey].correctStreak >= 3) {
                        delete wrongWords[wordKey];
                    }
                }
            } else {
                document.getElementById("result").innerHTML = "答錯，答案是：" + current[1];
                if (!wrongWords[wordKey]) {
                    wrongWords[wordKey] = {
                        word: current[0],
                        definition: current[1],
                        correctStreak: 0
                    };
                } else {
                    wrongWords[wordKey].correctStreak = 0;
                }
            }

            localStorage.setItem(wrongWordsKey, JSON.stringify(wrongWords));
            document.getElementById("nextBtn").disabled = false;
            document.querySelectorAll("#options button").forEach(button => {
                button.disabled = true;
            });
        }

        function nextQuestion(){
            if(!answered) return;
            currentIndex++;

            if(currentIndex >= practiceWords.length){
                alert("恭喜！所有單字皆已練習完畢！將重新開始。");
                currentIndex = 0;
            }

            showQuestion();
        }

        window.onload = initPractice;
    </script>
</body>
</html>
